<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f0e8" />
    <title>jtp.fyi — Oh, hello there</title>
    <meta name="description" content="You found the unusually elaborate homepage for a short-link domain." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="site-header">
        <a class="wordmark" href="/" aria-label="jtp.fyi home">jtp<span>.fyi</span></a>
        <a class="admin-trigger" href="/admin">Admin <span aria-hidden="true">↗</span></a>
      </header>

      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">HEY, I DIDN'T SEE YOU THERE.</p>
        <h1 id="page-title">Just a little<br />link machine.</h1>
        <p class="intro">This domain mostly exists to make long links behave themselves. But since you arrived intentionally: welcome, fellow internet snoop.</p>
      </section>

      <section class="links-section" aria-labelledby="links-heading">
        <div class="section-heading">
          <h2 id="links-heading">The useful bits</h2>
          <span id="link-count" class="link-count">Loading…</span>
        </div>
        <div id="link-list" class="link-list" aria-live="polite"></div>
      </section>

      <footer>
        <span>© <span id="year"></span> John Pierson</span>
        <span>An aggressively unnecessary homepage.</span>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
